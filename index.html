}

.empty-state { text-align: center; padding: 60px 20px; color: rgba(26,26,46,0.6); }

.empty-state p { font-size: 14px; }
.modal-overlay {
  position: fixed; inset: 0; z-index: 500;

  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: rgba(255,255,255,0.35); backdrop-filter: blur(28px);
  border: 2px solid rgba(255,255,255,0.5); border-radius: 28px; padding: 32px;
  width: 100%; max-width: 500px;
  box-shadow: 0 24px 64px rgba(21,101,192,0.3), inset 0 1px 0 rgba(255,255,255,0.6);

@keyframes slideUp { from { opacity: 0; transform: translateY(40px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
.modal-title { font-family: 'Baloo 2', cursive; font-size: 22px; font-weight: 800; color: var(--shin-black); margin-bottom: 24px; display: flex; align-items: center; gap: 10px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-full { grid-column: span 2; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-label { font-size: 12px; font-weight: 700; color: rgba(26,26,46,0.7); text-transform: uppercase; letter-spacing: 0.5px; }
.modal-actions { display: flex; gap: 10px; margin-top: 24px; justify-content: flex-end; }

.divider { height: 1px; background: rgba(255,255,255,0.3); margin: 20px 0; }

    <!-- MAIN -->
    <div class="glass-card" id="mainArea">
      <div class="no-book-selected" id="noBookState">
        <div class="big-emoji">📖</div>
        <h2>Pick an address book!</h2>
        <p>Select a book from the sidebar to manage contacts,<br>or create a new one to get started!</p>
      </div>

      <div id="bookContent" style="display:none;">
        <div class="main-area-header">
          <div class="main-title"><span id="bookEmoji">📒</span> <span id="activeBookName">—</span></div>
          <div class="main-controls">
            <div class="search-wrap">
              <span class="search-icon">🔍</span>
              <input class="input-glass" id="searchInput" placeholder="Search contacts..." oninput="filterContacts()" />
            </div>
            <select class="sort-select" id="sortSelect" onchange="loadContacts()">
              <option value="default">Default order</option>
              <option value="name">Sort by name</option>
              <option value="location">Sort by city</option>
            </select>
            <button class="btn btn-blue" onclick="openAddModal()">+ Add Contact</button>
          </div>
        </div>
        <div class="stats-row" id="statsRow"></div>
        <div class="contacts-grid" id="contactsGrid"></div>
      </div>
    </div>
  </div>
</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="contactModal" style="display:none;" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title" id="modalTitle">✏️ Add Contact</div>
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">First Name *</label>
        <input class="input-glass" id="f_firstName" placeholder="John" />
      </div>
      <div class="form-group">
        <label class="form-label">Last Name *</label>
        <input class="input-glass" id="f_lastName" placeholder="Doe" />
      </div>
      <div class="form-group form-full">
        <label class="form-label">Address *</label>
        <input class="input-glass" id="f_address" placeholder="123 Main Street" />
      </div>
      <div class="form-group">
        <label class="form-label">City *</label>
        <input class="input-glass" id="f_city" placeholder="Mumbai" />
      </div>
      <div class="form-group">
        <label class="form-label">State *</label>
        <input class="input-glass" id="f_state" placeholder="Maharashtra" />
      </div>
      <div class="form-group">
        <label class="form-label">ZIP (6 digits)</label>
        <input class="input-glass" id="f_zip" placeholder="400001" maxlength="6" />
      </div>
      <div class="form-group">
        <label class="form-label">Phone (10 digits)</label>
        <input class="input-glass" id="f_phone" placeholder="9876543210" maxlength="10" />
      </div>
      <div class="form-group form-full">
        <label class="form-label">Email</label>
        <input class="input-glass" id="f_email" placeholder="john@example.com" type="email" />
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="modalSaveBtn" onclick="saveContact()">💾 Save Contact</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const API = 'http://addressbook.us-east-1.elasticbeanstalk.com/api';
let books = [];
let activeBookId = null;
let activeBookName = '';
let contacts = [];
// Store contacts by id for safe edit lookup
const contactStore = {};

const COLORS = ['#1565C0','#E53935','#FF7043','#2E7D32','#6A1B9A','#AD1457','#00838F','#F57F17'];
const EMOJIS = ['📒','📗','📘','📙','📕','📓','📔','📃'];

function hashStr(s) { let h = 0; for (let c of s) h += c.charCodeAt(0); return h; }
function getColor(name) { return COLORS[hashStr(name) % COLORS.length]; }
function getInitials(fn, ln) { return ((fn||'')[0]||'').toUpperCase() + ((ln||'')[0]||'').toUpperCase(); }
function getEmoji(name) { return EMOJIS[hashStr(name) % EMOJIS.length]; }

function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = (type==='success' ? '✅ ' : '❌ ') + msg;
  t.className = 'show ' + type;
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.className = '', 2800);
}

async function api(method, path, body) {
  try {
    const opts = { method, headers: {'Content-Type':'application/json'} };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(API + path, opts);
    const data = await res.json();
    if (!res.ok) throw new Error(data.message || 'Request failed');
    return data.data;
  } catch(e) {
    const msg = e.message || 'API error';
    const friendly = (msg.includes('Failed to fetch') || msg.includes('NetworkError'))
      ? 'Cannot reach server. Check network or CORS.'
      : msg;
    showToast(friendly, 'error');
    throw e;
  }
}

// ─── BOOKS ───────────────────────────────────────────────
async function loadBooks() {
  try {
    books = await api('GET', '/addressbooks') || [];
    renderBooks();
  } catch {}
}

function renderBooks() {
  const ul = document.getElementById('bookList');
  if (!books.length) {
    ul.innerHTML = '<li style="text-align:center;padding:16px;font-size:13px;color:rgba(26,26,46,0.5);">No books yet — create one! 📖</li>';
    return;
  }
  ul.innerHTML = books.map(b => `
    <li class="book-item${b.id===activeBookId?' active':''}" onclick="selectBook(${b.id},'${esc(b.name)}')">
      <div class="book-item-name">
        <span>${getEmoji(b.name)}</span>
        <span>${escHtml(b.name)}</span>
      </div>
      <div style="display:flex;align-items:center;gap:6px;">
        <span class="book-badge" id="badge-${b.id}">—</span>
        <button class="book-delete-btn" onclick="event.stopPropagation();deleteBook(${b.id},'${esc(b.name)}')" title="Delete book">✕</button>
      </div>
    </li>`).join('');
  books.forEach(b => loadBookCount(b.id));
}

async function loadBookCount(bookId) {
  try {
    const list = await api('GET', `/addressbooks/${bookId}/contacts`);
    const el = document.getElementById(`badge-${bookId}`);
    if (el) el.textContent = (list||[]).length;
  } catch {}
}

async function createBook() {
  const inp = document.getElementById('newBookName');
  const name = inp.value.trim();
  if (!name) { showToast('Enter a book name!', 'error'); return; }
  try {
    const book = await api('POST', `/addressbooks?name=${encodeURIComponent(name)}`);
    books.push(book);
    renderBooks();
    inp.value = '';
    showToast(`"${name}" book created!`);
  } catch {}
}

async function deleteBook(id, name) {
  if (!confirm(`Delete "${name}" and all its contacts?`)) return;
  try {
    await api('DELETE', `/addressbooks/${id}`);
    books = books.filter(b => b.id !== id);
    if (activeBookId === id) { activeBookId = null; showMain(false); }
    renderBooks();
    showToast(`"${name}" deleted`);
  } catch {}
}

function selectBook(id, name) {
  activeBookId = id;
  activeBookName = name;
  document.getElementById('activeBookName').textContent = name;
  document.getElementById('bookEmoji').textContent = getEmoji(name);
  showMain(true);
  renderBooks();
  loadContacts();
}

function showMain(show) {
  document.getElementById('noBookState').style.display = show ? 'none' : 'flex';
  document.getElementById('bookContent').style.display = show ? 'block' : 'none';
}

// ─── CONTACTS ────────────────────────────────────────────
async function loadContacts() {
  if (!activeBookId) return;
  const sel = document.getElementById('sortSelect')?.value || 'default';
  let path = `/addressbooks/${activeBookId}/contacts`;
  if (sel === 'name') path += '/sorted/name';
  else if (sel === 'location') path += '/sorted/location';
  try {
    contacts = await api('GET', path) || [];
    // Build store keyed by "firstName|lastName"
    contacts.forEach(c => { contactStore[`${c.firstName}|${c.lastName}`] = c; });
    renderContacts(contacts);
    renderStats(contacts);
    loadBookCount(activeBookId);
  } catch {}
}

function filterContacts() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = contacts.filter(c =>
    `${c.firstName} ${c.lastName}`.toLowerCase().includes(q) ||
    (c.city||'').toLowerCase().includes(q) ||
    (c.email||'').toLowerCase().includes(q)
  );
  renderContacts(filtered);
  renderStats(filtered);
}

function renderStats(list) {
  const cities = [...new Set(list.map(c=>c.city).filter(Boolean))];
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-pill"><span class="dot" style="background:#1565C0"></span>${list.length} contact${list.length!==1?'s':''}</div>
    ${cities.slice(0,4).map(ci=>`<div class="stat-pill"><span class="dot" style="background:#FF7043"></span>${escHtml(ci)}</div>`).join('')}
    ${cities.length>4?`<div class="stat-pill">+${cities.length-4} more cities</div>`:''}
  `;
}

function renderContacts(list) {
  const grid = document.getElementById('contactsGrid');
  if (!list.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div class="emoji">🤷</div>
      <h3>No contacts found!</h3>
      <p>Add a contact or try a different search.</p>
    </div>`;
    return;
  }
  grid.innerHTML = list.map(c => {
    const col = getColor(`${c.firstName}${c.lastName}`);
    const initials = getInitials(c.firstName, c.lastName);
    // Store key for safe lookup on edit click
    const key = `${c.firstName}|${c.lastName}`;
    contactStore[key] = c;
    return `<div class="contact-card">
      <div style="display:flex;align-items:flex-start;gap:12px;">
        <div class="contact-avatar" style="background:${col}">${initials}</div>
        <div style="flex:1;min-width:0;">
          <div class="contact-name">${escHtml(c.firstName)} ${escHtml(c.lastName)}</div>
          <div class="contact-details">
            ${c.address?`<div class="contact-detail"><span class="icon">🏠</span><span>${escHtml(c.address)}</span></div>`:''}
            ${c.city||c.state?`<div class="contact-detail"><span class="icon">📍</span><span>${[c.city,c.state].filter(Boolean).map(escHtml).join(', ')}${c.zip?' – '+escHtml(c.zip):''}</span></div>`:''}
            ${c.phoneNumber?`<div class="contact-detail"><span class="icon">📞</span><span>${escHtml(c.phoneNumber)}</span></div>`:''}
            ${c.email?`<div class="contact-detail"><span class="icon">✉️</span><span style="word-break:break-all">${escHtml(c.email)}</span></div>`:''}
          </div>
        </div>
      </div>
      <div class="contact-actions">
        <button class="btn btn-ghost btn-sm" data-edit-key="${escAttr(key)}" onclick="openEditByKey(this)">✏️ Edit</button>
        <button class="btn btn-danger" data-fn="${escAttr(c.firstName)}" data-ln="${escAttr(c.lastName)}" onclick="deleteContactByBtn(this)">🗑 Delete</button>
      </div>
    </div>`;
  }).join('');
}

// ─── MODAL ───────────────────────────────────────────────
let editingFirstName = null;
let editingLastName = null;

function openAddModal() {
  editingFirstName = null;
  editingLastName = null;
  document.getElementById('modalTitle').textContent = '✏️ Add Contact';
  document.getElementById('modalSaveBtn').textContent = '💾 Save Contact';
  clearForm();
  document.getElementById('contactModal').style.display = 'flex';
}

// Called from button's data attribute — no inline JSON needed
function openEditByKey(btn) {
  const key = btn.getAttribute('data-edit-key');
  const c = contactStore[key];
  if (!c) { showToast('Contact data not found, please refresh.', 'error'); return; }
  openEditModal(c);
}

function openEditModal(c) {
  editingFirstName = c.firstName;
  editingLastName = c.lastName;
  document.getElementById('modalTitle').textContent = '✏️ Edit Contact';
  document.getElementById('modalSaveBtn').textContent = '💾 Update Contact';
  document.getElementById('f_firstName').value = c.firstName || '';
  document.getElementById('f_lastName').value = c.lastName || '';
  document.getElementById('f_address').value = c.address || '';
  document.getElementById('f_city').value = c.city || '';
  document.getElementById('f_state').value = c.state || '';
  document.getElementById('f_zip').value = c.zip || '';
  document.getElementById('f_phone').value = c.phoneNumber || '';
  document.getElementById('f_email').value = c.email || '';
  document.getElementById('contactModal').style.display = 'flex';
}

function closeModal() { document.getElementById('contactModal').style.display = 'none'; }

function clearForm() {
  ['firstName','lastName','address','city','state','zip','phone','email']
    .forEach(f => { document.getElementById('f_'+f).value = ''; });
}

async function saveContact() {
  const dto = {
    firstName: document.getElementById('f_firstName').value.trim(),
    lastName:  document.getElementById('f_lastName').value.trim(),
    address:   document.getElementById('f_address').value.trim(),
    city:      document.getElementById('f_city').value.trim(),
    state:     document.getElementById('f_state').value.trim(),
    zip:       document.getElementById('f_zip').value.trim(),
    phoneNumber: document.getElementById('f_phone').value.trim(),
    email:     document.getElementById('f_email').value.trim(),
  };
  if (!dto.firstName || !dto.lastName || !dto.address || !dto.city || !dto.state) {
    showToast('Please fill all required (*) fields!', 'error'); return;
  }
  try {
    if (editingFirstName !== null) {
      // PUT /addressbooks/{bookId}/contacts/{firstName}/{lastName}
      await api('PUT',
        `/addressbooks/${activeBookId}/contacts/${encodeURIComponent(editingFirstName)}/${encodeURIComponent(editingLastName)}`,
        dto
      );
      showToast('Contact updated! ✅');
    } else {
      await api('POST', `/addressbooks/${activeBookId}/contacts`, dto);
      showToast('Contact added! 🎉');
    }
    closeModal();
    loadContacts();
  } catch {}
}

// Delete from card button using data attributes (no inline JSON)
function deleteContactByBtn(btn) {
  const fn = btn.getAttribute('data-fn');
  const ln = btn.getAttribute('data-ln');
  deleteContact(fn, ln);
}

async function deleteContact(fn, ln) {
  if (!confirm(`Delete ${fn} ${ln}?`)) return;
  try {
    await api('DELETE', `/addressbooks/${activeBookId}/contacts/${encodeURIComponent(fn)}/${encodeURIComponent(ln)}`);
    showToast('Contact deleted');
    loadContacts();
  } catch {}
}

// ─── UTILS ───────────────────────────────────────────────
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function escAttr(s) { return escHtml(s); }
function esc(s) { return String(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

// Floating bubbles
const bubble = document.getElementById('bubbles');
for (let i = 0; i < 14; i++) {
  const s = document.createElement('span');
  const size = 20 + Math.random()*60;
  s.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;animation-duration:${8+Math.random()*14}s;animation-delay:${Math.random()*12}s;`;
  bubble.appendChild(s);
}

loadBooks();
</script>
</body>
</html>
